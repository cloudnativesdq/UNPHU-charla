services:
  revealjs:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./html/slides:/usr/share/nginx/html/slides:ro
      - ./html/index.html:/usr/share/nginx/html/index.html:ro
      - ./html/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  sync:
    build: ./sync-server
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://revealjs:80
    depends_on:
      - revealjs
      - sync
    restart: unless-stopped
