services:
  revealjs:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./html/slides:/usr/share/nginx/html/slides:ro
      - ./html/index.html:/usr/share/nginx/html/index.html:ro
      - ./html/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  sync:
    build: ./sync-server
    restart: unless-stopped

  hedgedoc:
    image: quay.io/hedgedoc/hedgedoc:1.10.0
    ports:
      - "3001:3000"
    environment:
      - CMD_DB_URL=sqlite:///db/hedgedoc.sqlite
      - CMD_ALLOW_ORIGIN=["*"]
      - CMD_ALLOW_ANONYMOUS=true
      - CMD_ALLOW_ANONYMOUS_EDITS=true
      - CMD_ALLOW_FREEURL=true
      - CMD_DEFAULT_PERMISSION=freely
      - CMD_USECDN=true
    volumes:
      - ./hedgedoc-data:/db
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://revealjs:80
    depends_on:
      - revealjs
      - sync
      - hedgedoc
    restart: unless-stopped

  tunnel-edit:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://hedgedoc:3000
    depends_on:
      - hedgedoc
    restart: unless-stopped

volumes:
  hedgedoc-data:
