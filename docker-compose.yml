services:
  revealjs:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./html/presentation:/usr/share/nginx/html:ro
      - ./html/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://revealjs:80
    depends_on:
      - revealjs
    restart: unless-stopped
