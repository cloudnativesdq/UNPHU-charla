# Redis configuration for link shortener

# Network
bind 0.0.0.0
protected-mode no
port 6379

# General
daemonize no
supervised no
loglevel notice

# Persistence (optional for development)
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security (no password for development)
# requirepass ""

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 60
