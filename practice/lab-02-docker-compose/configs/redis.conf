# Redis configuration for Link Shortener

# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Persistence
save 60 1000
save 300 100
save 900 1
appendonly yes
appendfsync everysec

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300
