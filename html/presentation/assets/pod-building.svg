<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect x="0" y="0" width="400" height="320" fill="#080b12"/>

  <text x="200" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Pod = Apartamento compartido</text>
  <text x="200" y="48" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#7d8590">Containers (roommates) comparten red, storage y ciclo de vida</text>

  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="240" height="220" rx="6" fill="#1a2540" stroke="#326CE5" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="28" fill="#326CE5"/>
    <text x="120" y="19" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" fill="white">POD: mi-app</text>

    <g transform="translate(10, 38)">
      <rect x="0" y="0" width="105" height="80" rx="4" fill="#0a1628" stroke="#3fb950" stroke-width="1.5"/>
      <text x="52" y="20" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="700" fill="#a8e6b4">Container A</text>
      <text x="52" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7d8590">nginx</text>
      <line x1="10" y1="48" x2="95" y2="48" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
      <text x="52" y="62" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#7d8590">puerto 80</text>
    </g>

    <g transform="translate(125, 38)">
      <rect x="0" y="0" width="105" height="80" rx="4" fill="#0a1628" stroke="#3fb950" stroke-width="1.5"/>
      <text x="52" y="20" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="700" fill="#a8e6b4">Container B</text>
      <text x="52" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7d8590">logger</text>
      <line x1="10" y1="48" x2="95" y2="48" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
      <text x="52" y="62" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#7d8590">puerto 9000</text>
    </g>

    <g transform="translate(10, 130)">
      <rect x="0" y="0" width="220" height="32" rx="4" fill="#0a1628" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="110" y="20" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#a3c4ff">Network compartida (localhost)</text>
    </g>
    <g transform="translate(10, 168)">
      <rect x="0" y="0" width="220" height="32" rx="4" fill="#0a1628" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="110" y="20" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#f5d56e">Volume compartido</text>
    </g>
  </g>

  <g font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#7d8590">
    <text x="200" y="310" text-anchor="middle" font-style="italic">Misma IP, mismo storage, mismo ciclo de vida</text>
  </g>
</svg>
