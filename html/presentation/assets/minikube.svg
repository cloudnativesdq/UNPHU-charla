<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- minikube: stylized "mk" + ship wheel -->
  <g transform="translate(32 32)">
    <!-- Ship wheel outer -->
    <g fill="#326CE5">
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(45)"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(90)"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(135)"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(180)"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(225)"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(270)"/>
      <rect x="-1.5" y="-22" width="3" height="6" rx="0.5" transform="rotate(315)"/>
    </g>
    <circle r="14" fill="#326CE5"/>
    <circle r="14" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#fff" text-anchor="middle">mk</text>
  </g>
</svg>
