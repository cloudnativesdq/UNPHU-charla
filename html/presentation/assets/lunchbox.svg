<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" fill="none">
  <defs>
    <!-- Lunchbox body gradient: presentation blue -->
    <linearGradient id="lb-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Lunchbox lid gradient -->
    <linearGradient id="lb-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Runtime layer: presentation orange -->
    <linearGradient id="lb-runtime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <!-- Kernel: green -->
    <linearGradient id="lb-kernel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <!-- App card: green accent -->
    <linearGradient id="card-app" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <!-- Libs card: yellow accent -->
    <linearGradient id="card-libs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef9c3"/>
      <stop offset="1" stop-color="#fef08a"/>
    </linearGradient>
    <!-- Config card: cyan accent -->
    <linearGradient id="card-cfg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cffafe"/>
      <stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
    <!-- Drop shadow for lunchbox -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1d4ed8" flood-opacity="0.25"/>
    </filter>
    <!-- Shadow for inner cards -->
    <filter id="card-shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ===== TITLE BAR ===== -->
  <rect x="0" y="0" width="460" height="48" rx="10" fill="#1e3a5f"/>
  <text x="230" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Un contenedor = un lunchbox</text>
  <text x="230" y="38" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#93c5fd">Todo lo que tu app necesita, empaquetado</text>

  <!-- ===== LUNCHBOX ===== -->
  <g transform="translate(50, 58)" filter="url(#shadow)">

    <!-- Lid (top bar) -->
    <rect x="0" y="0" width="360" height="30" rx="8" fill="url(#lb-lid)" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="8" y="8" width="18" height="14" rx="3" fill="#ffffff" opacity="0.3"/>
    <rect x="334" y="8" width="18" height="14" rx="3" fill="#ffffff" opacity="0.3"/>
    <text x="180" y="20" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.85">contenedor</text>

    <!-- Lunchbox body -->
    <rect x="0" y="30" width="360" height="210" rx="6" fill="url(#lb-body)"/>

    <!-- ===== INNER CARDS ROW ===== -->
    <g transform="translate(12, 42)" filter="url(#card-shadow)">
      <!-- App card -->
      <rect x="0" y="0" width="100" height="58" rx="6" fill="url(#card-app)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="50" y="20" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="11" font-weight="700" fill="#15803d">App</text>
      <text x="50" y="34" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#166534">tu codigo</text>
      <rect x="35" y="42" width="30" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
      <rect x="35" y="48" width="22" height="3" rx="1.5" fill="#22c55e" opacity="0.3"/>
    </g>

    <g transform="translate(122, 42)" filter="url(#card-shadow)">
      <!-- Libs card -->
      <rect x="0" y="0" width="100" height="58" rx="6" fill="url(#card-libs)" stroke="#eab308" stroke-width="1.5"/>
      <text x="50" y="20" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="11" font-weight="700" fill="#a16207">Libs</text>
      <text x="50" y="34" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#854d0e">dependencias</text>
      <rect x="30" y="42" width="40" height="3" rx="1.5" fill="#eab308" opacity="0.5"/>
      <rect x="35" y="48" width="30" height="3" rx="1.5" fill="#eab308" opacity="0.3"/>
    </g>

    <g transform="translate(232, 42)" filter="url(#card-shadow)">
      <!-- Config card -->
      <rect x="0" y="0" width="100" height="58" rx="6" fill="url(#card-cfg)" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="50" y="20" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="11" font-weight="700" fill="#0e7490">Config</text>
      <text x="50" y="34" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#155e75">env vars</text>
      <rect x="30" y="42" width="40" height="3" rx="1.5" fill="#06b6d4" opacity="0.5"/>
      <rect x="38" y="48" width="24" height="3" rx="1.5" fill="#06b6d4" opacity="0.3"/>
    </g>

    <!-- ===== RUNTIME LAYER ===== -->
    <g transform="translate(12, 110)" filter="url(#card-shadow)">
      <rect x="0" y="0" width="320" height="46" rx="6" fill="url(#card-cfg)" stroke="#f97316" stroke-width="1.5"/>
      <text x="160" y="20" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="12" font-weight="700" fill="#9a3412">Python 3.12</text>
      <text x="160" y="35" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#c2410c" opacity="0.85">runtime base</text>
    </g>

    <!-- ===== KERNEL LAYER (dashed border = shared) ===== -->
    <g transform="translate(12, 164)">
      <rect x="0" y="0" width="320" height="52" rx="6" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="160" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" opacity="0.9">Linux kernel</text>
      <text x="160" y="38" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#ffffff" opacity="0.65">compartido con el host (no se copia)</text>
    </g>

  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(50, 298)">
    <rect x="0" y="0" width="9" height="9" rx="2" fill="#22c55e" opacity="0.7"/>
    <text x="14" y="8.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#475569">codigo</text>

    <rect x="70" y="0" width="9" height="9" rx="2" fill="#eab308" opacity="0.7"/>
    <text x="84" y="8.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#475569">dependencias</text>

    <rect x="175" y="0" width="9" height="9" rx="2" fill="#06b6d4" opacity="0.7"/>
    <text x="189" y="8.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#475569">config</text>

    <rect x="245" y="0" width="9" height="9" rx="2" fill="#f97316" opacity="0.7"/>
    <text x="259" y="8.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#475569">runtime</text>

    <rect x="318" y="0" width="9" height="9" rx="2" fill="#ffffff" opacity="0.5" stroke="#ffffff" stroke-width="1"/>
    <text x="332" y="8.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="9" fill="#475569">kernel (compartido)</text>
  </g>

</svg>
