<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="lunchbox-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#326CE5"/>
      <stop offset="1" stop-color="#1a4aaf"/>
    </linearGradient>
    <linearGradient id="lunchbox-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a8aff"/>
      <stop offset="1" stop-color="#326CE5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="#080b12"/>

  <text x="200" y="30" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Un contenedor = un lunchbox</text>
  <text x="200" y="50" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="11" fill="#7d8590">Todo lo que tu app necesita, empaquetado</text>

  <g transform="translate(60, 70)">
    <rect x="0" y="20" width="280" height="40" rx="6" fill="url(#lunchbox-lid)" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="4" y="56" width="272" height="6" rx="3" fill="#1a4aaf" opacity="0.6"/>
    <rect x="0" y="60" width="280" height="170" rx="6" fill="url(#lunchbox-body)" stroke="#326CE5" stroke-width="1.5"/>

    <g transform="translate(12, 74)">
      <rect x="0" y="0" width="80" height="50" rx="4" fill="#1a2540" stroke="#3fb950" stroke-width="1.5"/>
      <text x="40" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#a8e6b4">App</text>
      <text x="40" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#7d8590">main.py</text>
    </g>

    <g transform="translate(100, 74)">
      <rect x="0" y="0" width="80" height="50" rx="4" fill="#1a2540" stroke="#d29922" stroke-width="1.5"/>
      <text x="40" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#f5d56e">Libs</text>
      <text x="40" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#7d8590">pip packages</text>
    </g>

    <g transform="translate(188, 74)">
      <rect x="0" y="0" width="80" height="50" rx="4" fill="#1a2540" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="40" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#a3c4ff">Config</text>
      <text x="40" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#7d8590">env vars</text>
    </g>

    <g transform="translate(12, 132)">
      <rect x="0" y="0" width="256" height="36" rx="4" fill="#1a2540" stroke="#1f9eff" stroke-width="1.5"/>
      <text x="128" y="16" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#a3d4ff">Python 3.12</text>
      <text x="128" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#7d8590">runtime base</text>
    </g>

    <g transform="translate(12, 176)">
      <rect x="0" y="0" width="256" height="44" rx="4" fill="#0a1628" stroke="#7d8590" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="128" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#7d8590">Linux kernel (compartido)</text>
      <text x="128" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#7d8590">del host, no del container</text>
    </g>
  </g>

  <g font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#7d8590">
    <line x1="100" y1="170" x2="80" y2="170" stroke="#3fb950" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="78" y="167" text-anchor="end">codigo</text>
    <line x1="180" y1="170" x2="180" y2="170" stroke="#d29922" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="195" y="167">dependencias</text>
    <line x1="280" y1="170" x2="280" y2="170" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="295" y="167">config</text>
  </g>
</svg>
