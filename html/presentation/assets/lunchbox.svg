<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" fill="none">
  <defs>
    <!-- Lunchbox body: vivid blue -->
    <linearGradient id="lb-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- Lunchbox lid: lighter blue -->
    <linearGradient id="lb-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- App card: vivid green -->
    <linearGradient id="card-app" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BBF7D0"/>
      <stop offset="1" stop-color="#86EFAC"/>
    </linearGradient>
    <!-- Libs card: vivid yellow -->
    <linearGradient id="card-libs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
    <!-- Config card: vivid cyan -->
    <linearGradient id="card-cfg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- Runtime card: vivid orange -->
    <linearGradient id="card-runtime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FED7AA"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <!-- Kernel: vivid teal -->
    <linearGradient id="lb-kernel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
    <!-- Title bar gradient -->
    <linearGradient id="title-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Strong drop shadow for lunchbox -->
    <filter id="shadow-lg" x="-8%" y="-5%" width="116%" height="115%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1D4ED8" flood-opacity="0.35"/>
    </filter>
    <!-- Card shadow -->
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ===== TITLE BAR ===== -->
  <rect x="0" y="0" width="460" height="48" rx="10" fill="url(#title-bar)"/>
  <circle cx="28" cy="24" r="7" fill="#EF4444"/>
  <circle cx="46" cy="24" r="7" fill="#F59E0B"/>
  <circle cx="64" cy="24" r="7" fill="#22C55E"/>
  <text x="230" y="20" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="13" font-weight="800" fill="#EFF6FF">Un contenedor = un lunchbox</text>
  <text x="230" y="36" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#93C5FD">Todo lo que tu app necesita, empaquetado</text>

  <!-- ===== LUNCHBOX ===== -->
  <g transform="translate(55, 58)" filter="url(#shadow-lg)">

    <!-- Lid -->
    <rect x="0" y="0" width="350" height="32" rx="8" fill="url(#lb-lid)" stroke="#93C5FD" stroke-width="2"/>
    <!-- Lid latches -->
    <rect x="12" y="7" width="22" height="18" rx="4" fill="#FFFFFF" opacity="0.35"/>
    <rect x="316" y="7" width="22" height="18" rx="4" fill="#FFFFFF" opacity="0.35"/>
    <text x="175" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" opacity="0.95">contenedor</text>

    <!-- Lunchbox body -->
    <rect x="0" y="32" width="350" height="208" rx="6" fill="url(#lb-body)" stroke="#60A5FA" stroke-width="1.5"/>

    <!-- Inner shadow overlay on body top edge -->
    <rect x="0" y="32" width="350" height="6" rx="3" fill="#000000" opacity="0.15"/>

    <!-- ===== ROW 1: App + Libs + Config ===== -->
    <g transform="translate(14, 46)" filter="url(#shadow-sm)">
      <!-- App -->
      <rect x="0" y="0" width="100" height="62" rx="8" fill="url(#card-app)" stroke="#22C55E" stroke-width="2"/>
      <text x="50" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="14" font-weight="800" fill="#14532D">App</text>
      <text x="50" y="38" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#166534">tu codigo</text>
      <rect x="30" y="46" width="40" height="4" rx="2" fill="#22C55E" opacity="0.6"/>
      <rect x="35" y="53" width="30" height="4" rx="2" fill="#22C55E" opacity="0.35"/>
    </g>

    <g transform="translate(124, 46)" filter="url(#shadow-sm)">
      <!-- Libs -->
      <rect x="0" y="0" width="100" height="62" rx="8" fill="url(#card-libs)" stroke="#EAB308" stroke-width="2"/>
      <text x="50" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="14" font-weight="800" fill="#713F12">Libs</text>
      <text x="50" y="38" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#854D0E">dependencias</text>
      <rect x="30" y="46" width="40" height="4" rx="2" fill="#EAB308" opacity="0.6"/>
      <rect x="35" y="53" width="30" height="4" rx="2" fill="#EAB308" opacity="0.35"/>
    </g>

    <g transform="translate(234, 46)" filter="url(#shadow-sm)">
      <!-- Config -->
      <rect x="0" y="0" width="100" height="62" rx="8" fill="url(#card-cfg)" stroke="#06B6D4" stroke-width="2"/>
      <text x="50" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="14" font-weight="800" fill="#155E75">Config</text>
      <text x="50" y="38" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#0E7490">env vars</text>
      <rect x="30" y="46" width="40" height="4" rx="2" fill="#06B6D4" opacity="0.6"/>
      <rect x="35" y="53" width="30" height="4" rx="2" fill="#06B6D4" opacity="0.35"/>
    </g>

    <!-- ===== ROW 2: Runtime ===== -->
    <g transform="translate(14, 120)" filter="url(#shadow-sm)">
      <rect x="0" y="0" width="320" height="50" rx="8" fill="url(#card-runtime)" stroke="#F97316" stroke-width="2"/>
      <text x="160" y="22" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="15" font-weight="800" fill="#7C2D12">Python 3.12</text>
      <text x="160" y="38" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#9A3412" opacity="0.85">runtime base</text>
    </g>

    <!-- ===== ROW 3: Kernel (dashed border = shared, not copied) ===== -->
    <g transform="translate(14, 180)">
      <rect x="0" y="0" width="320" height="46" rx="8" fill="#F0F9FF" opacity="0.15" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6,4"/>
      <text x="160" y="18" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" opacity="0.95">Linux kernel</text>
      <text x="160" y="34" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.7">compartido con el host (no se copia)</text>
    </g>

  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(55, 308)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#22C55E"/>
    <text x="18" y="10.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">codigo</text>

    <rect x="82" y="0" width="12" height="12" rx="3" fill="#EAB308"/>
    <text x="100" y="10.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">dependencias</text>

    <rect x="190" y="0" width="12" height="12" rx="3" fill="#06B6D4"/>
    <text x="208" y="10.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">config</text>

    <rect x="265" y="0" width="12" height="12" rx="3" fill="#F97316"/>
    <text x="283" y="10.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">runtime</text>

    <rect x="350" y="0" width="12" height="12" rx="3" fill="#FFFFFF" opacity="0.5" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="368" y="10.5" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">kernel (compartido)</text>
  </g>

</svg>
