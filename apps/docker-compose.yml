version: '3.8'

services:
  # Redis Database
  redis:
    image: redis:7-alpine
    container_name: link-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./database/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - link-shortener-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: link-shortener-backend
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLASK_ENV=development
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - link-shortener-network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:5000
    container_name: link-shortener-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - link-shortener-network
    restart: unless-stopped

networks:
  link-shortener-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
